name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install '.[dev]' ruff
      - run: ruff check .
      - run: ruff format --check .
      # DB-free test subset: test_collect mocks psycopg2/requests entirely;
      # test_infra monkeypatches asyncpg and never opens a real pool.
      - run: python -m pytest -q tests/test_collect.py tests/test_infra.py
